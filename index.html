<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  >

  <title>
    Ryan's Learning Adventure
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body class="theme-space">

  <div class="app">

    <!-- ========================= -->
    <!-- TABS -->
    <!-- ========================= -->

    <div class="app-tabs">

      <button
        id="mathTab"
        class="tab active"
      >
        ➕ Math Adventures
      </button>

      <button
        id="storyTab"
        class="tab"
      >
        📚 Story Adventures
      </button>

      <button
        id="spellingTabBtn"
        class="tab"
      >
        ✏️ Spelling Adventures
      </button>

    </div>

    <!-- ========================= -->
    <!-- MATH -->
    <!-- ========================= -->

    <section id="mathSection">

      <div class="top-row">

        <div class="stats-row">

          <div class="stat-card">
            🔥 Streak:
            <span id="streakCount">
              0
            </span>
          </div>

          <div class="stat-card">
            ⭐ Solved:
            <span id="solvedCount">
              0
            </span>
          </div>

        </div>

        <select id="difficulty">

          <option value="easy">
            Easy
          </option>

          <option
            value="medium"
            selected
          >
            Medium
          </option>

          <option value="hard">
            Hard
          </option>

          <option value="expert">
            Expert
          </option>

        </select>

      </div>

      <div class="main-content">

        <div class="story-banner">

          ⭐ Solve math problems
          to power Ryan's adventures!

        </div>

        <div class="question-container">

          <div class="question-card">

            <div
              id="question"
              class="question-text"
            >
              5 + 5
            </div>

            <div
              id="answerDisplay"
              class="answer-display"
            >
              _
            </div>

            <div
              id="feedback"
              class="feedback"
            ></div>

          </div>

        </div>

        <div
          id="keypad"
          class="keypad"
        >

          <button class="key">1</button>
          <button class="key">2</button>
          <button class="key">3</button>

          <button class="key">4</button>
          <button class="key">5</button>
          <button class="key">6</button>

          <button class="key">7</button>
          <button class="key">8</button>
          <button class="key">9</button>

          <button class="key action">
            ⌫
          </button>

          <button class="key">0</button>

          <button class="key action">
            ✓
          </button>

        </div>

      </div>

    </section>

    <!-- ========================= -->
    <!-- STORIES -->
    <!-- ========================= -->

    <section
      id="storySection"
      class="hidden"
    >

      <div id="bookshelfView">

        <div class="story-mode-title">
          📚 Ryan's Story Adventures
        </div>

        <div class="story-controls">

          <button id="bedtimeBtn">
            🌙 Bedtime Mode
          </button>

          <button id="audioToggleBtn">
            🔊 Ambient Sound
          </button>

        </div>

        <div
          id="bookshelf"
          class="bookshelf"
        ></div>

      </div>

      <div
        id="readerView"
        class="hidden"
      >

        <div class="story-controls">

          <button
            id="backToLibraryBtn"
          >
            ⬅ Library
          </button>

          <button
            id="readStoryBtn"
          >
            🔊 Read To Me
          </button>

        </div>

        <div class="story-book">

          <div
            id="storyTitle"
            class="story-mode-title"
          >
            Story Title
          </div>

          <div
            id="storyProgress"
            class="story-banner"
          >
            Page 1 of 8
          </div>

          <div
            id="storyIllustration"
            class="story-illustration"
          >
            🚀 🌌 ⭐
          </div>

          <div
            id="storyText"
            class="story-text"
          >
            Story text here...
          </div>

          <div class="story-buttons">

            <button id="prevPageBtn">
              ⬅ Previous
            </button>

            <button id="nextPageBtn">
              Next ➡
            </button>

          </div>

        </div>

      </div>

    </section>

    <!-- ========================= -->
    <!-- SPELLING -->
    <!-- ========================= -->

    <section
      id="spellingSection"
      class="hidden"
    >

      <div class="story-mode-title">
        ✏️ Ryan's Spelling Adventures
      </div>

      <div class="story-banner">
        Learn spelling with sounds,
        streaks, and fun word challenges!
      </div>

      <div class="top-row">

  <div class="stats-row">

    <div class="stat-card">
      🔥 Streak:
      <span id="spellingStreakCount">
        0
      </span>
    </div>

    <div class="stat-card">
      ⭐ Solved:
      <span id="spellingSolvedCount">
        0
      </span>
    </div>

  </div>

  <!-- GAME MODE -->

  <select id="gameMode">

    <option value="listen">
      🔊 Listen & Spell
    </option>

    <option value="scramble">
      🔀 Unscramble
    </option>

    <option value="missing">
      ❓ Missing Letter
    </option>

  </select>

  <!-- DIFFICULTY -->

  <select id="spellingDifficulty">

    <option value="easy">
      🟢 Easy
    </option>

    <option value="medium">
      🟡 Medium
    </option>

    <option value="hard">
      🔴 Hard
    </option>

  </select>

  <!-- THEME -->

  <select id="spellingTheme">

    <option value="all">
      🌎 All Themes
    </option>

    <option value="animals">
      🐶 Animals
    </option>

    <option value="food">
      🍕 Food
    </option>

    <option value="space">
      🚀 Space
    </option>

    <option value="dinosaurs">
      🦖 Dinosaurs
    </option>

    <option value="pirates">
      🏴‍☠️ Pirates
    </option>

    <option value="magic">
      🧙 Magic
    </option>

    <option value="vehicles">
      🚗 Vehicles
    </option>

  </select>

</div>

      <div class="main-content">

        <div
          id="spellingEmoji"
          class="story-illustration"
        >
          ✏️
        </div>

        <div class="question-container">

          <div class="question-card">

            <div
              id="spellingWordDisplay"
              class="question-text"
            >
              Press Speak
            </div>

            <div
              id="spellingInputDisplay"
              class="answer-display"
            >
              _
            </div>

            <div
              id="spellingFeedback"
              class="feedback"
            ></div>

          </div>

        </div>

        <div class="story-controls">

          <button id="speakWordBtn">
            🔊 Speak Word
          </button>

          <button id="nextWordBtn">
            ⏭ Next Word
          </button>

        </div>

        <div
          id="spellingKeyboard"
          class="spelling-keyboard"
        >

          <!-- ROW 1 -->

          <button class="spell-key">A</button>
          <button class="spell-key">B</button>
          <button class="spell-key">C</button>
          <button class="spell-key">D</button>
          <button class="spell-key">E</button>
          <button class="spell-key">F</button>
          <button class="spell-key">G</button>

          <!-- ROW 2 -->

          <button class="spell-key">H</button>
          <button class="spell-key">I</button>
          <button class="spell-key">J</button>
          <button class="spell-key">K</button>
          <button class="spell-key">L</button>
          <button class="spell-key">M</button>
          <button class="spell-key">N</button>

          <!-- ROW 3 -->

          <button class="spell-key">O</button>
          <button class="spell-key">P</button>
          <button class="spell-key">Q</button>
          <button class="spell-key">R</button>
          <button class="spell-key">S</button>
          <button class="spell-key">T</button>
          <button class="spell-key">U</button>

          <!-- ROW 4 -->

          <button class="spell-key">V</button>
          <button class="spell-key">W</button>
          <button class="spell-key">X</button>
          <button class="spell-key">Y</button>
          <button class="spell-key">Z</button>

          <button class="spell-key action">
            ⌫
          </button>

          <button class="spell-key action">
            ✓
          </button>

        </div>

      </div>

    </section>

  </div>

  <!-- ========================= -->
  <!-- SCRIPTS -->
  <!-- ========================= -->

  <script defer src="js/math.js"></script>

  <script defer src="js/story.js"></script>

  <script defer src="js/spellingwords.js"></script>

  <script defer src="js/spelling.js"></script>

  <script defer src="js/app.js"></script>

  <!-- ========================= -->
  <!-- CONFETTI -->
  <!-- ========================= -->

  <canvas
    id="confettiCanvas"
    style="
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:9999;
    "
  ></canvas>

</body>

</html>
