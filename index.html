<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Ryan's Adventure World</title>

<link rel="stylesheet" href="style.css" />

<link
  href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap"
  rel="stylesheet"
/>

</head>

<body>

<canvas id="confettiCanvas"></canvas>

<div class="background-glow"></div>

<div class="app">

  <!-- ========================= -->
  <!-- TABS -->
  <!-- ========================= -->

  <header class="topbar">

    <div class="app-tabs">

      <button
        id="mathTab"
        class="tab active"
      >
        🧮 Math Adventure
      </button>

      <button
        id="storyTab"
        class="tab"
      >
        📚 Story Time
      </button>

    </div>

  </header>

  <!-- ========================= -->
  <!-- MATH -->
  <!-- ========================= -->

  <section id="mathSection">

    <div class="top-row">

      <div class="right-controls">

        <button id="settingsBtn">
          ⚙️ Settings
        </button>

        <button id="refreshBtn">
          🔄 Refresh
        </button>

      </div>

    </div>

    <div class="bottom-row">

      <select id="difficulty">

        <option value="easy">
          🌱 Easy
        </option>

        <option value="medium" selected>
          🚀 Medium
        </option>

        <option value="hard">
          🔥 Hard
        </option>

        <option value="expert">
          👑 Expert
        </option>

      </select>

    </div>

    <main class="main-content">

      <div
        class="story-banner"
        id="storyBanner"
      >
        🚀 Loading Adventure...
      </div>

      <div
        class="question-container"
        id="questionContainer"
      ></div>

      <div
        class="feedback"
        id="feedback"
      ></div>

      <!-- ========================= -->
      <!-- KEYPAD -->
      <!-- ========================= -->

      <div
        class="keypad"
        id="keypad"
      >

        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>

        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>

        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>

        <button class="key action">
          ⌫
        </button>

        <button class="key">0</button>

        <button class="key action">
          ✓
        </button>

      </div>

    </main>

  </section>

  <!-- ========================= -->
  <!-- STORY -->
  <!-- ========================= -->

  <section
    id="storySection"
    class="hidden"
  >

    <div class="story-mode-header">

      <div class="story-mode-title">
        📚 Cozy Story Time
      </div>

      <div class="story-controls">

        <button id="readStoryBtn">
          🎙️ Read To Me
        </button>

        <button id="bedtimeBtn">
          🌙 Bedtime Mode
        </button>

      </div>

    </div>

    <div class="story-book">

      <div
        class="story-illustration"
        id="storyIllustration"
      >
        🚀🌕⭐
      </div>

      <div
        class="story-text"
        id="storyText"
      ></div>

      <div class="story-buttons">

        <button id="prevPageBtn">
          ⬅️ Previous
        </button>

        <button id="nextPageBtn">
          Next ➡️
        </button>

      </div>

    </div>

  </section>

  <!-- ========================= -->
  <!-- SETTINGS PANEL -->
  <!-- ========================= -->

  <div
    class="settings-panel"
    id="settingsPanel"
  >

    <h2>
      Parent Settings
    </h2>

    <label>

      Sound Effects

      <input
        type="checkbox"
        id="soundToggle"
        checked
      />

    </label>

    <label>

      Bedtime Glow

      <input
        type="checkbox"
        id="glowToggle"
        checked
      />

    </label>

    <label>

      Bigger Numbers

      <input
        type="checkbox"
        id="bigNumberToggle"
      />

    </label>

    <label>

      Show Hints

      <input
        type="checkbox"
        id="hintToggle"
        checked
      />

    </label>

  </div>

</div>

<script src="js/math.js"></script>
<script src="js/story.js"></script>
<script src="js/app.js"></script>

</body>

</html>
