<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Math Adventure</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap"
    rel="stylesheet"
  >
</head>

<body>

  <div class="background-glow"></div>

  <div class="app">

    <header class="topbar">
      <div class="left-controls">
        <div class="streak-card">
          🔥 Streak:
          <span id="streak">0</span>
        </div>

        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="expert">Expert</option>
        </select>
      </div>

      <div class="right-controls">
        <select id="themeSelector">
          <option value="space">🚀 Space</option>
          <option value="dino">🦖 Dino</option>
          <option value="jungle">🐯 Jungle</option>
          <option value="ocean">🌊 Ocean</option>
        </select>

        <button id="refreshBtn">
          🔄 New Questions
        </button>
      </div>
    </header>

    <main class="main-content">

      <div class="progress-text">
        Questions Solved:
        <span id="solvedCount">0</span>
      </div>

      <div id="questionContainer" class="question-container"></div>

      <div id="feedback" class="feedback"></div>

      <div class="keypad" id="keypad">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>

        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>

        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>

        <button class="key action">⌫</button>
        <button class="key">0</button>
        <button class="key action">✓</button>
      </div>

      <div class="break-message" id="breakMessage"></div>

    </main>

    <button class="settings-btn" id="settingsBtn">
      ⚙️
    </button>

    <div class="settings-panel hidden" id="settingsPanel">

      <h2>Parent Settings</h2>

      <label>
        <input type="checkbox" id="additionToggle" checked />
        Addition
      </label>

      <label>
        <input type="checkbox" id="subtractionToggle" checked />
        Subtraction
      </label>

      <label>
        <input type="checkbox" id="multiplicationToggle" checked />
        Multiplication
      </label>

      <label>
        <input type="checkbox" id="divisionToggle" checked />
        Division
      </label>

      <label>
        Max Number:
        <input type="range" id="maxRange" min="10" max="100" value="20" />
      </label>

      <div class="range-value">
        Max:
        <span id="rangeValue">20</span>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
